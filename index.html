<!DOCTYPE html>
<html>
<head>
<title>My Love Message ❤️</title>

<style>
*{
    box-sizing:border-box;
    font-family:"Georgia",serif;
}

body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(135deg,#ffe5ef,#fff6fa);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}


/* floating hearts */
.heart{
    position:absolute;
    color:#ff7ba9;
    animation:float 6s infinite;
    opacity:.5;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-20vh);
    }
}


.card{

    width:430px;
    min-height:720px;
    background:#fffafa;
    border-radius:35px;
    padding:45px 40px;
    box-shadow:0 20px 50px #e8b7ca;
    text-align:center;
}


.big-heart{
    font-size:70px;
    animation:pulse 1.5s infinite;
}


@keyframes pulse{
    50%{
        transform:scale(1.2);
    }
}


h1{
    color:#d6336c;
    font-size:32px;
}


.subtitle{
    color:#d86b91;
    margin-bottom:30px;
}


.message-box{

    background:#fff0f5;
    border:1px solid #ffc1d7;
    border-radius:22px;
    padding:25px;
    font-size:20px;
    font-style:italic;
    color:#8b3552;
    min-height:120px;
}


.buttons button{

    margin:8px;
    padding:10px 20px;
    border-radius:20px;
    border:1px solid #ffbad1;
    background:white;
    color:#d6336c;
    cursor:pointer;
}


textarea{

    width:100%;
    height:110px;
    margin-top:15px;
    border-radius:20px;
    padding:20px;
    border:1px solid #ffbfd5;
    font-size:17px;
}


.main-btn{

    margin-top:20px;
    width:100%;
    padding:18px;
    border:none;
    border-radius:20px;
    background:linear-gradient(90deg,#df4c85,#c92b6b);
    color:white;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}


.save-btn{

    background:#ff7ca8;
    margin-top:15px;
}


.share-btn{

    background:#25D366;
    margin-top:15px;
}


footer{

    margin-top:20px;
    color:#d88aa8;
}


</style>

</head>


<body>


<div class="card" id="loveCard">


<div class="big-heart">❤️</div>

<h1>
A Message From My<br>
Infinite Love
</h1>


<div class="subtitle">
💌 For my soulmate
</div>


<div class="message-box" id="display">

You are my sunshine, my reason to smile every single day. 🌸

</div>



<div class="buttons">

<button onclick="setMsg('You are my forever happiness ❤️')">
Sunshine
</button>


<button onclick="setMsg('Every memory with you is my treasure 💕')">
Memories
</button>


<button onclick="setMsg('I will love you forever and always 💖')">
Always
</button>


<button onclick="setMsg('You complete my heart ❤️')">
Complete Me
</button>


</div>



<hr>



<h3 style="color:#d86b91">
✦ Write your own message
</h3>


<textarea id="input">
You are my sunshine, my reason to smile every single day. 🌸
</textarea>



<button class="main-btn" onclick="showMessage()">

💌 Show My Message

</button>



<button class="main-btn save-btn" onclick="saveCard()">

📸 Save Result

</button>



<button class="main-btn share-btn" onclick="shareLove()">

💚 Send To My Love

</button>


<footer>
Tap ❤️ and share your feelings forever
</footer>


</div>




<script>


function setMsg(text){

document.getElementById("input").value=text;

document.getElementById("display").innerHTML=text;

}



function showMessage(){

let msg=document.getElementById("input").value;

document.getElementById("display").innerHTML=msg;

}



function saveCard(){

let card=document.getElementById("loveCard");


html2canvas(card).then(canvas=>{

let link=document.createElement("a");

link.download="My_Love_Message.png";

link.href=canvas.toDataURL();

link.click();

});


}



function shareLove(){

let msg=document.getElementById("input").value;


let whatsapp=
"https://wa.me/?text="+
encodeURIComponent(
"❤️ My Love Message ❤️\n\n"+msg
);


window.open(whatsapp,"_blank");


}




// create floating hearts

for(let i=0;i<25;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤";

h.style.left=Math.random()*100+"%";

h.style.animationDelay=Math.random()*5+"s";

h.style.fontSize=(10+Math.random()*25)+"px";

document.body.appendChild(h);

}


</script>


<!-- screenshot library -->
<script src="
https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js">
</script>


</body>
</html>
