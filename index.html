<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Infinite Love ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(135deg,#ffe6ef,#fff8fb);

overflow:hidden;

font-family:"Georgia",serif;

}


/* floating hearts */

.heart{

position:absolute;
bottom:-20px;
color:#ff8db3;
animation:rise 8s linear infinite;

}


@keyframes rise{

0%{
transform:translateY(0);
opacity:0;
}

20%{
opacity:1;
}

100%{

transform:translateY(-110vh);
opacity:0;

}

}



/* main card */

.card{

width:min(90vw,430px);

height:min(95vh,760px);

background:#ffffffcc;

backdrop-filter:blur(10px);

border-radius:35px;

padding:35px 28px;

box-shadow:
0 15px 40px rgba(220,80,130,.25);

text-align:center;

overflow:hidden;

}




.top-heart{

font-size:55px;

animation:pulse 1.5s infinite;

}


@keyframes pulse{

50%{
transform:scale(1.15);
}

}



h1{

margin-top:15px;

font-size:clamp(25px,5vw,34px);

color:#d6336c;

line-height:1.1;

}



.subtitle{

margin:15px;

color:#d86b91;

font-size:18px;

}



/* message display */

.display{

background:#fff1f6;

border:1px solid #ffc5d8;

border-radius:20px;

padding:22px;

height:145px;

display:flex;

align-items:center;

justify-content:center;

font-size:18px;

font-style:italic;

color:#8c3452;

overflow:auto;

}



.tags{

margin:15px 0;

}



.tags button{


border:1px solid #ffc1d5;

background:white;

color:#d6336c;

padding:8px 16px;

border-radius:20px;

margin:4px;

cursor:pointer;

}




textarea{

width:100%;

height:100px;

border-radius:18px;

border:1px solid #ffc1d5;

padding:15px;

resize:none;

font-size:16px;

font-family:inherit;

}




.main{

margin-top:15px;

width:100%;

height:50px;

border:none;

border-radius:25px;

background:
linear-gradient(90deg,#e84d88,#c72b6c);

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

}



.row{

display:flex;

gap:10px;

margin-top:12px;

}



.row button{


flex:1;

height:45px;

border-radius:22px;

border:1px solid #ffbdd2;

background:white;

color:#d6336c;

font-weight:bold;

cursor:pointer;

}



footer{

margin-top:15px;

font-size:14px;

color:#d78ba5;

}




</style>

</head>


<body>



<div class="card" id="card">


<div class="top-heart">
❤️
</div>


<h1>
My Infinite Love<br>
For You
</h1>


<div class="subtitle">

💌 for my love

</div>



<div class="display" id="show">

My love for you has no beginning and no end.
You are my forever happiness. 🌸

</div>




<div class="tags">

<button onclick="change('You are my sunshine ☀️❤️')">
Sunshine
</button>


<button onclick="change('Every memory with you is precious 💕')">
Memories
</button>


<button onclick="change('I will love you forever ♾️❤️')">
Forever
</button>


<button onclick="change('You complete my heart 💖')">
My Heart
</button>


</div>



<textarea id="msg">
No matter where life takes us, my heart will always choose you. I love you forever ❤️
</textarea>



<button class="main" onclick="showMessage()">

💌 Show My Message

</button>




<div class="row">

<button onclick="saveImage()">

⬇ Save Result

</button>


<button onclick="sendLove()">

💌 Send Love

</button>

</div>



<footer>

Made with unlimited love ❤️

</footer>


</div>



<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>



<script>


function change(text){

document.getElementById("msg").value=text;

}



function showMessage(){

let text=document.getElementById("msg").value;

document.getElementById("show").innerHTML=text;

}



function saveImage(){


html2canvas(document.getElementById("card"))
.then(canvas=>{


let a=document.createElement("a");

a.download="Infinite_Love_Card.png";

a.href=canvas.toDataURL();

a.click();


});


}




function sendLove(){

let text=document.getElementById("msg").value;


window.open(

"https://wa.me/?text="+

encodeURIComponent(
"❤️ My Love Message ❤️\n\n"+text
)

);


}



// floating hearts

for(let i=0;i<30;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤";

h.style.left=Math.random()*100+"%";

h.style.animationDelay=Math.random()*8+"s";

h.style.fontSize=
(12+Math.random()*25)+"px";


document.body.appendChild(h);

}


</script>


</body>
</html>
