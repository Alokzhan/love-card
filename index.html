<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Infinite Love ❤️</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:flex-start;

padding:25px 0;

background:
linear-gradient(135deg,#ffe3ee,#fff9fc);

overflow-y:auto;

font-family:"Georgia",serif;

}



/* Floating hearts */

.heart{

position:fixed;

bottom:-20px;

color:#ff8bb3;

animation:float 8s linear infinite;

z-index:0;

}



@keyframes float{

0%{

transform:translateY(0);

opacity:0;

}


20%{

opacity:1;

}


100%{

transform:translateY(-110vh);

opacity:0;

}

}




/* CARD */


.card{

position:relative;

z-index:2;


width:min(92vw,430px);


background:#ffffffdd;


border-radius:35px;


padding:35px 28px;


box-shadow:
0 15px 45px rgba(210,80,130,.25);


text-align:center;


margin-bottom:30px;


}




.heart-logo{

font-size:65px;

animation:pulse 1.5s infinite;

}



@keyframes pulse{

50%{

transform:scale(1.2);

}

}




h1{

color:#d6336c;

font-size:32px;

line-height:1.2;

margin-top:15px;

}



.subtitle{

color:#d86b91;

margin:15px;

font-size:18px;

}




/* Message */


.display{


background:#fff0f5;


border:1px solid #ffc2d8;


border-radius:22px;


padding:25px;


min-height:140px;


max-height:250px;


overflow-y:auto;


display:flex;


align-items:center;


justify-content:center;


font-size:19px;


font-style:italic;


color:#8b3552;


line-height:1.6;


}




/* Tags */


.tags{

margin:18px 0;

}



.tags button{


padding:9px 18px;


margin:5px;


border-radius:25px;


border:1px solid #ffc1d5;


background:white;


color:#d6336c;


cursor:pointer;


font-size:14px;


}




hr{

border:none;

height:1px;

background:#ffd0df;

margin:25px 0;

}




label{

display:block;

text-align:left;

color:#d86b91;

font-size:17px;

margin-bottom:10px;

}




textarea{


width:100%;


height:120px;


resize:none;


border-radius:20px;


border:1px solid #ffc1d5;


padding:18px;


font-size:17px;


font-family:Georgia;


outline:none;


}




.main-btn{


margin-top:18px;


width:100%;


height:55px;


border:none;


border-radius:30px;


background:
linear-gradient(90deg,#df4d87,#c92d6c);


color:white;


font-size:19px;


font-weight:bold;


cursor:pointer;


}




.action{


display:flex;


gap:12px;


margin-top:15px;


}



.action button{


flex:1;


height:48px;


border-radius:25px;


border:1px solid #ffc1d5;


background:white;


color:#d6336c;


font-size:15px;


font-weight:bold;


cursor:pointer;


}




footer{


margin-top:20px;


color:#d88aa8;


font-size:14px;


}



</style>

</head>




<body>




<div class="card" id="loveCard">



<div class="heart-logo">
❤️
</div>



<h1>

My Infinite Love<br>
For You

</h1>


<div class="subtitle">

💌 For My Love

</div>





<div class="display" id="display">

My love for you has no beginning and no end.
You are my happiness, my smile, and my forever. 🌸

</div>





<div class="tags">


<button onclick="quick('You are my sunshine and my reason to smile every day ☀️❤️')">

Sunshine

</button>



<button onclick="quick('Every memory with you is my favorite treasure 💕')">

Memories

</button>




<button onclick="quick('I promise to love you forever and always ♾️❤️')">

Forever

</button>





<button onclick="quick('You complete my heart and my world 💖')">

My Heart

</button>


</div>





<hr>




<label>
✦ Write your own message
</label>




<textarea id="message">

No matter where life takes us,
my heart will always choose you.
I love you forever ❤️

</textarea>





<button class="main-btn" onclick="showMessage()">

💌 Show My Message

</button>





<div class="action">


<button onclick="saveCard()">

⬇ Save Result

</button>



<button onclick="sendLove()">

💌 Send Love

</button>


</div>





<footer>

Made with endless love ❤️

</footer>




</div>





<script src="
https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js">
</script>



<script>



function quick(text){

document.getElementById("message").value=text;

}





function showMessage(){

let msg=document.getElementById("message").value;


document.getElementById("display").innerHTML=
msg.replace(/\n/g,"<br>");

}




function saveCard(){


html2canvas(document.getElementById("loveCard"))

.then(canvas=>{


let link=document.createElement("a");


link.download="My_Infinite_Love.png";


link.href=canvas.toDataURL();


link.click();



});


}





function sendLove(){


let msg=document.getElementById("message").value;


let url=

"https://wa.me/?text="+

encodeURIComponent(

"❤️ My Infinite Love Message ❤️\n\n"+msg

);



window.open(url,"_blank");


}





// floating hearts


for(let i=0;i<35;i++){


let heart=document.createElement("div");


heart.className="heart";


heart.innerHTML="❤";


heart.style.left=Math.random()*100+"%";


heart.style.animationDelay=Math.random()*8+"s";


heart.style.fontSize=
(12+Math.random()*25)+"px";


document.body.appendChild(heart);


}



</script>



</body>

</html>
